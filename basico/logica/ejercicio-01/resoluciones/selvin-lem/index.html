<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Battle Royale - Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>BATTLE ROYALE</h1>
            <h2>Leaderboard del Torneo</h2>
            <p>Sistema automatizado de puntuación y ordenamiento de escuadras.</p>
        </header>

        <main>
            <div class="actions">
                <button id="btn-calcular" class="btn-primary">Generar y Ordenar Ranking</button>
            </div>

            <div class="table-container">
                <table id="tabla-ranking">
                    <thead>
                        <tr>
                            <th>Posición</th>
                            <th>Escuadra</th>
                            <th>Bajas</th>
                            <th>Top Fin</th>
                            <th>Revividos</th>
                            <th>Puntos Totales</th>
                        </tr>
                    </thead>
                    <tbody id="rows">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
